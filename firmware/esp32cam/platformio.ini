[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

monitor_speed = 115200

board_build.partitions = huge_app.csv
board_build.f_cpu = 240000000L

lib_deps =
    tzapu/WiFiManager @ ^2.0.17

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=0

