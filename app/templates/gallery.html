<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MotionSense Pi Gallery</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="shell">
      <nav class="page-nav">
        <a class="button-link" href="/">Back to Dashboard</a>
        <a class="button-link secondary" href="/archive">Browse Archive</a>
      </nav>

      <section class="card">
        <div class="card-header">
          <div>
            <p class="eyebrow">Saved Gallery Photos</p>
            <h1>Gallery</h1>
            <p class="subtle">Photos moved out of the archive stay here until you download or delete them.</p>
          </div>
          <div class="actions compact">
            <button id="browser-select-button" type="button">Select All</button>
            <button id="browser-download-button" type="button">Download Selected</button>
            <button id="browser-delete-button" type="button" class="danger">Delete Selected</button>
          </div>
        </div>
        <p class="subtle archive-meta">Storage path: <code>{{ gallery_dir }}</code></p>

        <div id="browser-message" class="message" aria-live="polite"></div>
        <div id="browser-event-list" class="event-list"></div>
      </section>
    </main>
    <script id="browser-events" type="application/json">{{ events | tojson }}</script>
    <script id="browser-config" type="application/json">{{ {
      "listUrl": "/api/gallery",
      "downloadUrl": "/api/gallery/download",
      "deleteUrl": "/api/gallery/delete",
      "emptyMessage": "No gallery photos yet.",
      "refreshErrorMessage": "Gallery refresh failed.",
      "downloadErrorMessage": "Download failed.",
      "deleteErrorMessage": "Delete failed.",
      "deleteProgressMessage": "Deleting gallery photos..."
    } | tojson }}</script>
    <script src="{{ url_for('static', filename='event-browser.js') }}"></script>
  </body>
</html>
